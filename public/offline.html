<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline · RaceCtrl</title>
  <style>
    body {
      background-color: #000000;
      color: #F5F5F7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .card {
      background-color: rgba(28, 28, 30, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: rgba(255, 69, 58, 0.1);
      border: 1px solid rgba(255, 69, 58, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      color: #FF453A;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    p {
      color: #8E8E93;
      font-size: 13px;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    button {
      background-color: #FF453A;
      border: none;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 12px 24px;
      border-radius: 9999px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #D6382F;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
        <path d="M8.58 16.14a5 5 0 0 1 6.84 0"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
    </div>
    <h1>No Signal</h1>
    <p>RaceCtrl needs a connection to refresh race data. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
